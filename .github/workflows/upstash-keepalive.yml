name: Upstash Keepalive

on:
  schedule:
    - cron: "13 4 * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: upstash-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production endpoints
        env:
          BASE_URL: https://windrose-ai.com
        run: |
          set -euo pipefail

          endpoints=(
            "/api/frameworks/ping"
            "/api/world"
            "/api/world/experience?id=1"
          )

          for endpoint in "${endpoints[@]}"; do
            url="${BASE_URL}${endpoint}"
            code="$(curl -sS --retry 3 --retry-delay 2 --max-time 20 \
              -H 'User-Agent: windrose-upstash-keepalive/1.0' \
              -o /tmp/resp.txt -w '%{http_code}' "$url")"
            echo "$url -> $code"
            if [ "$code" -ge 400 ]; then
              echo "Request failed for $url"
              cat /tmp/resp.txt || true
              exit 1
            fi
          done

