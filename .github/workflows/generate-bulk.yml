name: Bulk Generate Blog Posts

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of posts to generate"
        required: false
        default: "20"
      mode:
        description: "Generation mode (news or evergreen)"
        required: false
        default: "evergreen"

concurrency:
  group: blog-publish
  cancel-in-progress: false

jobs:
  bulk_generate:
    name: Generate Multiple Posts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate posts in loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          COUNT: ${{ github.event.inputs.count }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          echo "Generating $COUNT posts in $MODE mode..."
          for i in $(seq 1 $COUNT); do
            echo "--- Post $i/$COUNT ---"
            npx tsx scripts/generate-post.ts --mode=$MODE || echo "Post $i failed, continuing..."
            sleep 3
          done

      - name: Commit and push all new posts
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git pull origin main || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/ content/content-queue.json
          git diff --cached --quiet && echo "No new posts to commit." && exit 0
          POST_COUNT=$(git diff --cached --name-only content/blog/ | wc -l | tr -d ' ')
          git commit -m "feat(blog): bulk-generated $POST_COUNT posts [mode=$INPUT_MODE]"
          git push "https://x-access-token:${GH_BOT_TOKEN}@github.com/${REPO}" main
