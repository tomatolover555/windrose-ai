name: Generate Blog Post

on:
  schedule:
    # Run Mon, Wed, Fri at 09:00 UTC
    - cron: "0 9 * * 1,3,5"
    # Run Tue, Thu at 09:00 UTC (evergreen mode)
    - cron: "0 9 * * 2,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual generation)"
        required: false
        default: "false"

concurrency:
  group: blog-publish
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "mode=news" >> $GITHUB_OUTPUT
          else
            DOW=$(date +%u)
            if [ "$DOW" = "2" ] || [ "$DOW" = "4" ]; then
              echo "mode=evergreen" >> $GITHUB_OUTPUT
            else
              echo "mode=news" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          GEN_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npx tsx scripts/generate-post.ts --dry-run
          else
            npx tsx scripts/generate-post.ts "--mode=$GEN_MODE"
          fi

      - name: Commit and push
        env:
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          GEN_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git pull origin main || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          git diff --cached --quiet && echo "No new post to commit." && exit 0
          git commit -m "post: AI-generated post for $(date +%Y-%m-%d) [mode=$GEN_MODE]"
          git push "https://x-access-token:${GH_BOT_TOKEN}@github.com/${REPO}" main
